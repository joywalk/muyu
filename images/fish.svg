<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景：圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#fishGradient)"/>

  <!-- 木鱼主体：简化版 -->
  <g transform="translate(100, 100)">
    <!-- 木鱼底部弧形 -->
    <path d="M-60,20 Q-60,50 -40,60 Q0,75 40,60 Q60,50 60,20 Z"
          fill="url(#woodGradient)" stroke="#e0e0e0" stroke-width="2"/>

    <!-- 木鱼顶部 -->
    <path d="M-60,20 Q-60,-10 -40,-20 Q0,-35 40,-20 Q60,-10 60,20"
          fill="url(#woodGradient)" stroke="#e0e0e0" stroke-width="2"/>

    <!-- 木鱼中间开口 -->
    <path d="M-50,20 Q0,45 50,20"
          fill="none" stroke="#c0c0c0" stroke-width="3"/>

    <!-- 木鱼纹理线条 -->
    <line x1="-45" y1="0" x2="-45" y2="40" stroke="#d0d0d0" stroke-width="1.5"/>
    <line x1="45" y1="0" x2="45" y2="40" stroke="#d0d0d0" stroke-width="1.5"/>

    <!-- 木棒 -->
    <line x1="0" y1="-50" x2="0" y2="-20"
          stroke="#8B4513" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="-20" x2="0" y2="20"
          stroke="#A0522D" stroke-width="10" stroke-linecap="round"/>

    <!-- 敲击点高光 -->
    <circle cx="0" cy="0" r="8" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- 渐变定义 -->
  <defs>
    <!-- 背景渐变 -->
    <radialGradient id="fishGradient" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </radialGradient>

    <!-- 木鱼渐变 -->
    <linearGradient id="woodGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f8f8f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#eeeeee;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
